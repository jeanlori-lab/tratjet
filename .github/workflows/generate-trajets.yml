name: Générer les pages trajet (SEO)

# Déclenchement manuel, ou automatique chaque matin (rafraîchit les prix
# carburant/péages des pages statiques trajets/*.html — le site principal, lui,
# recalcule déjà tout en temps réel à chaque visite).
# Publication directe sur main (pas de PR) : ces pages sont des instantanés SEO
# datés, sans enjeu critique. Un garde-fou dans le générateur abandonne sans
# rien écrire si trop de trajets échouent (API en panne), donc pas de risque de
# publier une liste/sitemap amputés.
on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installe les dépendances (Playwright)
        run: npm install

      - name: Installe Chromium pour Playwright
        run: npx playwright install --with-deps chromium

      - name: Génère les pages trajet
        run: npm run generate:trajets

      - name: Publie les pages mises à jour (commit direct sur main)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trajets sitemap.xml
          if git diff --cached --quiet; then
            echo "Aucun changement à publier."
          else
            git commit -m "Régénère les pages trajet (chiffres à jour)"
            git push
          fi
